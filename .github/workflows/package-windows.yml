name: Windows x64 打包

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: 构建 Windows x64 安装包
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v6

    - name: 配置 Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        architecture: x64
        cache: 'pip'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade pyinstaller
        pip install -r requirements.txt
        pip install -r requirements-phonrec-engine.txt

    - name: 检查发布版本一致性
      run: python scripts/check_release_version.py

    - name: 使用 PyInstaller 构建
      run: |
        pyinstaller --noconfirm --clean ToneExtractor_Suite.spec

    - name: 创建 Windows x64 压缩包
      shell: pwsh
      run: |
        Compress-Archive -Path dist/PhonTracer_Suite -DestinationPath dist/PhonTracer_Suite-Windows-x64.zip

    - name: 创建 Windows x64 安装包
      shell: pwsh
      run: |
        $iscc = Get-Command iscc -ErrorAction SilentlyContinue
        if ($iscc) {
            & iscc '/FPhonTracer_Setup_Windows_x64' /DMyAppVersion="${{ github.ref_name }}" installer.iss
        } elseif (Test-Path "C:\Program Files (x86)\Inno Setup 6\iscc.exe") {
            & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" '/FPhonTracer_Setup_Windows_x64' /DMyAppVersion="${{ github.ref_name }}" installer.iss
        } elseif (Test-Path "C:\Program Files\Inno Setup 6\iscc.exe") {
            & "C:\Program Files\Inno Setup 6\iscc.exe" '/FPhonTracer_Setup_Windows_x64' /DMyAppVersion="${{ github.ref_name }}" installer.iss
        } else {
            Write-Error "未找到 Inno Setup 编译器 iscc.exe"
            exit 1
        }

    - name: 发布 Windows x64 产物
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v3
      with:
        files: |
          dist/PhonTracer_Suite-Windows-x64.zip
          dist/PhonTracer_Setup_Windows_x64.exe
        name: PhonTracer ${{ github.ref_name }}
        draft: false
        prerelease: false
        overwrite_files: true
        fail_on_unmatched_files: true

    - name: 上传 Windows x64 开发产物
      if: "!startsWith(github.ref, 'refs/tags/')"
      uses: actions/upload-artifact@v4
      with:
        name: PhonTracer-Suite-Windows-x64
        path: |
          dist/PhonTracer_Suite-Windows-x64.zip
          dist/PhonTracer_Setup_Windows_x64.exe
        if-no-files-found: error
