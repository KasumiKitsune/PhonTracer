name: Multi-Platform Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0 等标签时触发自动发布

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --clean ToneExtractor_Suite.spec

    - name: Create Zip Archive (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        # 压缩整个套件文件夹
        Compress-Archive -Path dist/PhonTracer_Suite -DestinationPath dist/PhonTracer_Suite-Windows.zip

    - name: Build Setup Installer with Inno Setup (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" /DMyAppVersion="${{ github.ref_name }}" installer.iss

    - name: Create DMG Archive (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        cd dist
        mkdir -p PhonTracer_Suite
        ls -la
        mv PhonTracer.app PhonTracer_Suite/
        mv AudioToolkit.app PhonTracer_Suite/
        # Create a DMG file for macOS distribution
        hdiutil create -volname "PhonTracer_Suite" -srcfolder PhonTracer_Suite -ov -format UDZO PhonTracer_Suite-macOS.dmg

    - name: Create Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/*.zip
          dist/*.dmg
          dist/*.exe
        name: PhonTracer ${{ github.ref_name }}
        body: |
          ### 自动化发布
          - 平台: ${{ matrix.os }}
          - 自动构建可执行文件 (Windows 为 Zip 与 Setup安装包, macOS 为 DMG)
          - 基于最新代码逻辑与资源路径
        draft: false
        prerelease: false
        fail_on_unresolved_files: false

    - name: Upload Artifact (Development)
      if: "!startsWith(github.ref, 'refs/tags/')"
      uses: actions/upload-artifact@v4
      with:
        name: PhonTracer-Suite-${{ matrix.os }}
        path: |
          dist/*.zip
          dist/*.dmg
          dist/*.exe
        if-no-files-found: warn
