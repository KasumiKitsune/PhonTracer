name: Package Application (macOS Only)

# =================================================================
# 【意图说明】
# 1. 触发机制：仅支持手动触发 (workflow_dispatch)，禁用了自动触发（如 push 或 tags）。
# 2. 运行平台：专门为 macOS 设计，使用 macos-latest 运行环境。
# 3. 功能：打包 Python GUI 程序为 macOS 可执行文件，并上传为 Artifact。
# 4. 注意事项：此脚本依赖根目录下的 ToneExtractor.spec 和 requirements.txt。
# =================================================================

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # 当推送 v1.1.0 等标签时触发自动发布

jobs:
  build_macos:
    name: Build and Release for macOS
    runs-on: macos-latest
    permissions: # 赋予 Action 创建 Release 的权限
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm ToneExtractor.spec

    - name: Create Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/ToneExtractor/*
        name: PhonTracer ${{ github.ref_name }}
        body: |
          ### 🚀 自动化发布
          - 自动构建 macOS 可执行文件
          - 基于最新代码逻辑与资源路径
        draft: false
        prerelease: false


