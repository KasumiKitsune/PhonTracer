name: Multi-Platform Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # 当推送 v1.1.0 等标签时触发自动发布

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --clean ToneExtractor_Suite.spec

    - name: Create Zip Archive (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        # 压缩整个套件文件夹
        Compress-Archive -Path dist/PhonTracer_Suite -DestinationPath dist/PhonTracer_Suite-Windows.zip

    - name: Create Zip Archive (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        cd dist
        # macOS 下压缩整个 Suite 文件夹（包含 .app）
        zip -yr PhonTracer_Suite-macOS.zip PhonTracer_Suite/

    - name: Create Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/PhonTracer_Suite-Windows.zip
          dist/PhonTracer_Suite-macOS.zip
        name: ToneExtractor ${{ github.ref_name }}
        body: |
          ### 🚀 自动化发布
          - 平台: ${{ matrix.os }}
          - 自动构建可执行文件 (Zip 打包)
          - 基于最新代码逻辑与资源路径
        draft: false
        prerelease: false

    - name: Upload Artifact (Development)
      if: "!startsWith(github.ref, 'refs/tags/')"
      uses: actions/upload-artifact@v4
      with:
        name: PhonTracer-Suite-${{ matrix.os }}
        path: |
          dist/PhonTracer_Suite-Windows.zip
          dist/PhonTracer_Suite-macOS.zip
