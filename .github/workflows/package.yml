name: Multi-Platform Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' # 当推送 v1.0.0 等标签时触发自动发布

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python-arch: x64
            suffix: Windows-x64
            iscc_args: '/F"PhonTracer_Setup_Windows_x64"'
          - os: windows-11-arm
            python-arch: arm64
            suffix: Windows-ARM64
            iscc_args: '/F"PhonTracer_Setup_Windows_ARM64"'
          - os: macos-latest
            python-arch: arm64
            suffix: macOS
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        architecture: ${{ matrix.python-arch }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --clean ToneExtractor_Suite.spec

    - name: Create Zip Archive (Windows)
      if: startsWith(matrix.os, 'windows')
      shell: pwsh
      run: |
        # 压缩整个套件文件夹
        Compress-Archive -Path dist/PhonTracer_Suite -DestinationPath dist/PhonTracer_Suite-${{ matrix.suffix }}.zip

    - name: Build Setup Installer with Inno Setup (Windows)
      if: startsWith(matrix.os, 'windows')
      shell: pwsh
      run: |
        $iscc = Get-Command iscc -ErrorAction SilentlyContinue
        if ($iscc) {
            & iscc ${{ matrix.iscc_args }} /DMyAppVersion="${{ github.ref_name }}" installer.iss
        } else {
            if (Test-Path "C:\Program Files (x86)\Inno Setup 6\iscc.exe") {
                & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" ${{ matrix.iscc_args }} /DMyAppVersion="${{ github.ref_name }}" installer.iss
            } elseif (Test-Path "C:\Program Files\Inno Setup 6\iscc.exe") {
                & "C:\Program Files\Inno Setup 6\iscc.exe" ${{ matrix.iscc_args }} /DMyAppVersion="${{ github.ref_name }}" installer.iss
            } else {
                Write-Error "Inno Setup compiler (iscc.exe) not found!"
                exit 1
            }
        }

    - name: Create DMG Archive (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        cd dist
        mkdir -p PhonTracer_Suite
        ls -la
        mv PhonTracer.app PhonTracer_Suite/
        mv Toolkit.app PhonTracer_Suite/
        # Create a DMG file for macOS distribution
        for attempt in 1 2 3; do
          hdiutil detach "/Volumes/PhonTracer_Suite" -force 2>/dev/null || true
          rm -f PhonTracer_Suite-macOS.dmg
          if hdiutil create -volname "PhonTracer_Suite" -srcfolder PhonTracer_Suite -ov -format UDZO PhonTracer_Suite-macOS.dmg; then
            break
          fi
          if [ "$attempt" = "3" ]; then
            exit 1
          fi
          sleep 5
        done

    - name: Create Release and Upload Artifacts
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/*.zip
          dist/*.dmg
          dist/*.exe
        name: PhonTracer ${{ github.ref_name }}
        body: |
          ### 自动化发布
          - 平台: ${{ matrix.suffix }}
          - 自动构建可执行文件 (Windows 为 Zip 与 Setup安装包, macOS 为 DMG)
          - 基于最新代码逻辑与资源路径
        draft: false
        prerelease: false
        overwrite_files: true
        fail_on_unmatched_files: false

    - name: Upload Artifact (Development)
      if: "!startsWith(github.ref, 'refs/tags/')"
      uses: actions/upload-artifact@v4
      with:
        name: PhonTracer-Suite-${{ matrix.suffix }}
        path: |
          dist/*.zip
          dist/*.dmg
          dist/*.exe
        if-no-files-found: warn
