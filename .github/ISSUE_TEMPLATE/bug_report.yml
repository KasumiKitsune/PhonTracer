name: 错误报告
description: 报告可复现的软件行为问题
title: "[错误] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。GitHub Issue 默认公开，请勿上传敏感录音、真实姓名、令牌或未脱敏工程。安全问题请阅读 SECURITY.md 后私下报告。
  - type: input
    id: version
    attributes:
      label: 软件版本
      description: 可运行 `PhonTracerCLI.exe --version`，或在“关于”中查看。
      placeholder: 例如 1.3.0
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: 组件
      options:
        - PhonTracer 主程序
        - Toolkit
        - PhonTracer CLI
        - PhonRec 完整模式
        - PhonRec 独立模式
        - 安装或发布产物
        - 其他
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 系统与架构
      placeholder: 例如 Windows 11 24H2 x64 / macOS 15 Apple Silicon
    validations:
      required: true
  - type: dropdown
    id: input_type
    attributes:
      label: 相关输入类型
      options:
        - 新建空白工程
        - 普通 TXT/CSV 字表
        - 高级 PTWL 字表
        - TEPROJ 工程
        - WAV/MP3 音频
        - TextGrid
        - 自定义脚本
        - 不涉及输入文件
        - 其他
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 最短复现步骤
      placeholder: 请按 1、2、3 的顺序描述，并说明使用的文件类型。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果与错误信息
      description: 请粘贴完整错误文字或退出码。附件必须脱敏。
    validations:
      required: true
  - type: dropdown
    id: sanitized_project
    attributes:
      label: 是否可以提供脱敏的最小工程
      description: 不要直接上传真实研究数据；维护者需要时再按支持指南准备。
      options:
        - 可以提供脱敏最小工程
        - 无法提供，但可以补充日志或截图
        - 此问题不涉及工程文件
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索现有 Issue，未发现相同报告。
          required: true
        - label: 我没有上传敏感数据或未获授权的录音。
          required: true
        - label: 这不是需要私下报告的安全漏洞。
          required: true
